      padding: 1.5rem;

    }
    .glass-card {
      background: rgba(20, 25, 35, 0.65);

      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      max-height: 90vh;
      overflow-y: auto;
    }
    .neon-glow {
      box-shadow: 0 0 12px rgba(0, 180, 255, 0.5), 0 0 25px rgba(0, 200, 255, 0.3);
      transition: box-shadow 0.25s ease, transform 0.2s ease;
    }
    .neon-glow:hover {
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.8), 0 0 40px rgba(0, 190, 255, 0.5);
      transform: translateY(-2px);
    }
    .glass-input {
      background: rgba(10, 15, 24, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.2rem;
      color: white;
      transition: all 0.2s ease;
    }
    .glass-input:focus {
      border-color: rgba(0, 200, 255, 0.7);
      box-shadow: 0 0 18px rgba(0, 160, 255, 0.6);
      outline: none;
    }
    .glass-input option {
      background: #121826;
      color: #e0e0e0;
    }
    .download-link-container {
      transition: opacity 0.4s ease, transform 0.3s ease;
    }
    .fade-in {
      animation: fadeSlide 0.5s ease-out;
    }
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .gradient-text {
      background: linear-gradient(135deg, #a0e9ff, #6cb4ee, #4f9fcf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

    (function() {
      // DOM Elements
      const versionDropdown = document.getElementById('versionDropdown');
      const versionCustomInput = document.getElementById('versionCustomInput');
      const versionHint = document.getElementById('versionHint');
      const versionStatus = document.getElementById('versionStatus');
      const archSelect = document.getElementById('archSelect');
      const packageSelect = document.getElementById('packageSelect');
      const generateBtn = document.getElementById('generateBtn');
      const resultContainer = document.getElementById('resultContainer');
      const placeholderText = document.getElementById('placeholderText');

      const BASE_DOWNLOAD_URL = 'https://download.mikrotik.com/routeros';

      // Version status detection
      function getVersionStatus(version) {
        const major = parseInt(version.split('.')[0]);
        const minor = parseInt(version.split('.')[1]) || 0;
        const patch = parseInt(version.split('.')[2]) || 0;
        
        if (major >= 7) {
          if (version.includes('23') && minor >= 23) return { status: 'Testing', class: 'badge-testing' };
          if (minor >= 22) return { status: 'Stable', class: 'badge-stable' };
          if (minor >= 21) return { status: 'LTS', class: 'badge-lts' };
          return { status: 'Stable', class: 'badge-stable' };
        } else if (major === 6) {
          if (minor >= 49) return { status: 'LTS (EOL)', class: 'badge-eol' };
          return { status: 'EOL', class: 'badge-eol' };
        }
        return { status: 'EOL', class: 'badge-eol' };
      }

      // Get active version
      function getActiveVersion() {
        const customVal = versionCustomInput.value.trim();
        if (customVal !== '') {
          return customVal;
        }
        return versionDropdown.value;
      }

      // Update version hint and status
      function updateVersionUI() {
        if (versionCustomInput.value.trim() !== '') {
          versionHint.classList.remove('hidden');
          if (versionDropdown.value !== '') {
            versionDropdown.value = '';
          }
          const version = versionCustomInput.value.trim();
          if (isValidVersionFormat(version)) {
            const status = getVersionStatus(version);
            versionStatus.innerHTML = `<span class="version-badge ${status.class}">${status.status}</span>`;
          } else {
            versionStatus.innerHTML = '';
          }
        } else {
          versionHint.classList.add('hidden');
          const version = versionDropdown.value;
          if (version) {
            const status = getVersionStatus(version);
            versionStatus.innerHTML = `<span class="version-badge ${status.class}">${status.status}</span>`;
          } else {
            versionStatus.innerHTML = '';
          }
        }
      }

      // Event listeners
      versionCustomInput.addEventListener('input', function() {
        updateVersionUI();
        if (this.value.trim() !== '' && versionDropdown.value !== '') {
          versionDropdown.value = '';
        }
      });

      versionDropdown.addEventListener('change', function() {
        if (this.value !== '') {
          versionCustomInput.value = '';
        }
        updateVersionUI();
      });

      // Construct download URL
      function constructDownloadUrl(version, arch, packageType) {
        const cleanVersion = version.trim();
        if (!cleanVersion) return null;

        const archMap = {
          'x86': 'x86', 'arm': 'arm', 'arm64': 'arm64',
          'mipsbe': 'mipsbe', 'mmips': 'mmips', 'tile': 'tile',
          'ppc': 'ppc', 'smips': 'smips'
        };
        const archKey = archMap[arch] || arch.toLowerCase();
        let fileName = '';

        switch (packageType) {
          case 'npk': fileName = `routeros-${archKey}-${cleanVersion}.npk`; break;
          case 'iso': fileName = `routeros-${cleanVersion}-${archKey}.iso`; break;
          case 'img.zip': fileName = `routeros-${cleanVersion}-${archKey}.img.zip`; break;
          case 'all_packages.zip': fileName = `all_packages-${archKey}-${cleanVersion}.zip`; break;
          default: return null;
        }
        return `${BASE_DOWNLOAD_URL}/${cleanVersion}/${fileName}`;
      }

      function isValidVersionFormat(version) {
        const trimmed = version.trim();
        return /^\d+(\.\d+)*$/.test(trimmed);
      }

      function renderDownloadLink(downloadUrl, version, arch, packageType) {
        resultContainer.innerHTML = '';
        resultContainer.classList.add('fade-in');
        if (placeholderText) placeholderText.style.display = 'none';

        const status = getVersionStatus(version);
        const wrapper = document.createElement('div');
        wrapper.className = 'bg-white/5 backdrop-blur-md rounded-2xl p-5 border border-white/15 shadow-inner';
        const displayUrl = downloadUrl.length > 70 ? downloadUrl.substring(0, 67) + '...' : downloadUrl;

        wrapper.innerHTML = `
          <div class="flex flex-col space-y-4">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2 text-cyan-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                </svg>
                <span class="font-semibold text-sm uppercase tracking-wider">Download Link</span>
              </div>
              <span class="version-badge ${status.class} text-xs">${status.status}</span>
            </div>
            <div class="bg-black/30 rounded-xl p-3 text-sm font-mono text-gray-200 break-all border border-white/10">
              ${displayUrl}
            </div>
            <div class="flex flex-col sm:flex-row gap-3 mt-1">
              <a href="${downloadUrl}" target="_blank" rel="noopener noreferrer" 
                 class="flex-1 inline-flex items-center justify-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 px-5 rounded-xl transition-all duration-200 shadow-lg hover:shadow-cyan-500/30 active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download Now
              </a>
              <button id="copyUrlBtn" data-url="${downloadUrl.replace(/'/g, "&#39;")}" 
                      class="flex-1 inline-flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 border border-white/25 text-white font-medium py-3 px-5 rounded-xl transition-all duration-200 backdrop-blur-sm active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                Copy Link
              </button>
            </div>
            <p class="text-xs text-gray-400 text-center mt-1">
              Version ${version} • ${arch.toUpperCase()} • ${packageType.replace('_', ' ')}
            </p>
            <p class="text-xs text-yellow-400/70 text-center">
              ⚠️ Some older/discontinued versions may not be available on the server
            </p>
          </div>
        `;
        resultContainer.appendChild(wrapper);

        const copyBtn = document.getElementById('copyUrlBtn');
        if (copyBtn) {
          copyBtn.addEventListener('click', function(e) {
            const urlToCopy = this.getAttribute('data-url');
            if (!urlToCopy) return;
            navigator.clipboard.writeText(urlToCopy).then(() => {
              const originalHTML = this.innerHTML;
              this.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                Copied!
              `;
              this.classList.add('bg-green-600/40', 'border-green-400');
              setTimeout(() => {
                this.innerHTML = originalHTML;
                this.classList.remove('bg-green-600/40', 'border-green-400');
              }, 2000);
            }).catch(() => {
              alert('Failed to copy. Please manually copy the link.');
            });
          });
        }
      }

      function showError(message) {
        resultContainer.innerHTML = `
          <div class="bg-red-900/30 border border-red-400/40 rounded-2xl p-4 text-center text-red-200 backdrop-blur-sm fade-in">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto mb-2 text-red-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="font-medium">${message}</p>
          </div>
        `;
        if (placeholderText) placeholderText.style.display = 'none';
      }

      function handleGenerate() {
        const version = getActiveVersion();
        const arch = archSelect.value;
        const packageType = packageSelect.value;

        if (!version) {
          showError('Please select a version from dropdown or enter a custom version.');
          return;
        }
        if (!isValidVersionFormat(version)) {
          showError('Invalid version format. Use numbers and dots (e.g., 7.16.2 or 6.49.17).');
          return;
        }

        const downloadUrl = constructDownloadUrl(version, arch, packageType);
        if (!downloadUrl) {
          showError('Could not construct URL. Check your inputs.');
          return;
        }

        renderDownloadLink(downloadUrl, version, arch, packageType);
      }

      generateBtn.addEventListener('click', handleGenerate);

      versionCustomInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleGenerate();
        }
      });

      // Initialize with latest stable version
      window.addEventListener('DOMContentLoaded', function() {
        versionDropdown.value = '7.22.3';
        versionCustomInput.value = '';
        updateVersionUI();
        
        const defaultVersion = getActiveVersion();
        if (defaultVersion && isValidVersionFormat(defaultVersion)) {
          const defaultArch = archSelect.value;
          const defaultPackage = packageSelect.value;
          const defaultUrl = constructDownloadUrl(defaultVersion, defaultArch, defaultPackage);
          if (defaultUrl) {
            renderDownloadLink(defaultUrl, defaultVersion, defaultArch, defaultPackage);
          }
        }
      });

      resultContainer.addEventListener('animationend', function(e) {
        if (e.target === resultContainer && e.animationName === 'fadeSlide') {
          resultContainer.classList.remove('fade-in');
        }
      });
    })();
  </script>
</body>
</html>
